name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PR runs: ubuntu × py3.11 only (fast feedback).
        # Push to main / release branches: full matrix incl. windows-latest (#121).
        os: ${{ fromJson(github.event_name == 'pull_request' && '["ubuntu-latest"]' || '["ubuntu-latest","macos-latest","windows-latest"]') }}
        python-version: ${{ fromJson(github.event_name == 'pull_request' && '["3.11"]' || '["3.10","3.11","3.12"]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest (PR — fast subset, parallel, exclude slow)
        if: github.event_name == 'pull_request'
        env:
          MPLBACKEND: Agg
        run: python -m pytest -n auto -m "not slow"

      - name: Run pytest (push — full suite, parallel, coverage-gated)
        if: github.event_name != 'pull_request'
        env:
          MPLBACKEND: Agg
        run: python -m pytest -n auto -v --cov=src/chilmesh --cov-report=term --cov-fail-under=80

  rust-build:
    name: Rust build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build (release)
        run: cargo build --release --manifest-path src/chilmesh_core/Cargo.toml

      - name: Verify binary size
        shell: bash
        run: |
          SO=$(find src/chilmesh_core/target/release -name "*.so" -o -name "*.dylib" -o -name "*.dll" 2>/dev/null | head -1)
          if [ -n "$SO" ]; then
            SIZE=$(wc -c < "$SO")
            echo "Binary size: $SIZE bytes"
            [ "$SIZE" -lt 52428800 ] && echo "PASS: < 50 MB" || (echo "FAIL: >= 50 MB"; exit 1)
          fi

      - name: maturin build (wheel)
        run: |
          pip install maturin
          maturin build --release --manifest-path src/chilmesh_core/Cargo.toml

  pyo3-smoke:
    name: PyO3 smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and install Rust wheel
        run: |
          pip install maturin
          maturin build --release --manifest-path src/chilmesh_core/Cargo.toml
          pip install src/chilmesh_core/target/wheels/chilmesh_core-*.whl

      - name: Verify RustMesh import
        run: python -c "from chilmesh_core import RustMesh; print('RustMesh OK')"

  build-and-smoke:
    name: build sdist+wheel + smoke install
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: twine check
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Smoke test installed wheel
        shell: bash
        run: |
          python -m venv "$RUNNER_TEMP/smoke"
          VENV_PY=$(python -c "import os, sys; root = os.environ['RUNNER_TEMP'] + '/smoke'; print(root + ('/Scripts/python.exe' if sys.platform == 'win32' else '/bin/python'))")
          "$VENV_PY" -m pip install --upgrade pip
          "$VENV_PY" -m pip install dist/*.whl
          "$VENV_PY" -c "import chilmesh; m = chilmesh.examples.annulus(); print('OK', m.n_elems)"
